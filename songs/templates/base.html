<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Euphonic</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
    }
    nav {
      background: #1a1a2e;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #2a2a4e;
    }
    nav .brand {
      font-size: 1.3rem;
      font-weight: 700;
      color: #a855f7;
      text-decoration: none;
    }
    nav .links a {
      color: #a0a0c0;
      text-decoration: none;
      margin-left: 1rem;
      font-size: 0.9rem;
    }
    nav .links a:hover { color: #fff; }
    .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4e;
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .card h3 { margin-bottom: 0.5rem; }
    .card .meta { font-size: 0.85rem; color: #888; }
    .btn {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      text-decoration: none;
    }
    .btn-primary { background: #7c3aed; color: #fff; }
    .btn-primary:hover { background: #6d28d9; }
    .btn-danger { background: #dc2626; color: #fff; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-outline { background: transparent; border: 1px solid #555; color: #ccc; }
    .btn-outline:hover { background: #222; }
    .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.8rem; }
    form label { display: block; margin-top: 1rem; font-size: 0.9rem; color: #aaa; }
    form input, form select, form textarea {
      width: 100%;
      padding: 0.6rem;
      margin-top: 0.3rem;
      background: #0f0f0f;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 0.95rem;
    }
    form input:focus { border-color: #7c3aed; outline: none; }
    form .btn { margin-top: 1.2rem; }
    .actions { margin-top: 0.8rem; display: flex; gap: 0.5rem; }
    .empty { text-align: center; color: #666; padding: 3rem 1rem; }
    .empty p { font-size: 1.1rem; margin-bottom: 1rem; }
    .search-form { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .search-form input { flex: 1; }
    .stars { color: #facc15; font-size: 0.9rem; }
    .pagination { display: flex; justify-content: center; gap: 0.5rem; margin-top: 1.5rem; }
    .pagination a { color: #a855f7; text-decoration: none; padding: 0.3rem 0.7rem; border: 1px solid #333; border-radius: 4px; }
    .pagination a:hover { background: #2a2a4e; }
    .flash { background: #065f46; color: #6ee7b7; padding: 0.8rem 1.2rem; border-radius: 6px; margin-bottom: 1rem; }
    .inline-form { display: inline; }
  </style>
</head>
<body>
  <nav>
    <a href="{% url 'song_list' %}" class="brand">♫ Euphonic</a>
    <div class="links">
      {% if user.is_authenticated %}
        <span style="color:#888;font-size:0.85rem">{{ user.username }}</span>
        <a href="{% url 'song_search' %}">Buscar</a>
        <a href="{% url 'playlist_list' %}">Playlists</a>
        <a href="{% url 'song_create' %}">+ Nueva canción</a>
        <form method="post" action="{% url 'logout' %}" style="display:inline">
          {% csrf_token %}
          <button type="submit" style="background:none;border:none;color:#a0a0c0;cursor:pointer;font-size:0.9rem">Cerrar sesión</button>
        </form>
      {% else %}
        <a href="{% url 'login' %}">Iniciar sesión</a>
      {% endif %}
    </div>
  </nav>
  <div class="container">
    {% if messages %}
      {% for msg in messages %}
        <div class="flash">{{ msg }}</div>
      {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
