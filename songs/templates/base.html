<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Euphonic</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a2e;
      --border: #2a2a4a;
      --text: #e0e0e8;
      --text2: #8888aa;
      --primary: #a855f7;
      --primary-dim: #7c3aed;
      --danger: #ef4444;
      --gold: #facc15;
      --radius: 12px;
      --shadow: 0 4px 20px rgba(0,0,0,.4);
    }
    body.light {
      --bg: #f5f5fa;
      --surface: #ffffff;
      --surface2: #eeeef5;
      --border: #d0d0e0;
      --text: #1a1a2e;
      --text2: #666680;
      --shadow: 0 4px 20px rgba(0,0,0,.08);
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── NAV ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    nav .brand {
      font-size: 1.25rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
      letter-spacing: -.5px;
    }
    nav .nav-links { display: flex; align-items: center; gap: .25rem; }
    nav .nav-links a, nav .nav-links button {
      color: var(--text2);
      text-decoration: none;
      padding: .4rem .75rem;
      border-radius: 8px;
      font-size: .875rem;
      transition: all .2s;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }
    nav .nav-links a:hover, nav .nav-links button:hover {
      color: #fff;
      background: rgba(168,85,247,.12);
    }
    nav .nav-links .username {
      color: var(--text2);
      font-size: .8rem;
      padding: 0 .5rem;
      opacity: .7;
    }
    .hamburger {
      display: none;
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.5rem;
      cursor: pointer;
      padding: .3rem;
    }
    @media (max-width: 768px) {
      .hamburger { display: block; }
      nav .nav-links {
        display: none;
        position: absolute;
        top: 60px;
        left: 0;
        right: 0;
        background: var(--surface);
        flex-direction: column;
        padding: .75rem;
        border-bottom: 1px solid var(--border);
        gap: .15rem;
      }
      nav .nav-links.open { display: flex; }
      nav .nav-links a, nav .nav-links button { width: 100%; text-align: left; padding: .6rem .75rem; }
      nav .nav-links .username { padding: .6rem .75rem; }
    }

    /* ── CONTAINER ── */
    .container { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem; }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
      transition: transform .2s, box-shadow .2s;
    }
    .card:hover { box-shadow: 0 4px 24px rgba(168,85,247,.06); }

    /* ── META / STARS ── */
    .meta { font-size: .85rem; color: var(--text2); }
    .stars { color: var(--gold); font-size: .9rem; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      padding: .5rem 1rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: .85rem;
      font-family: inherit;
      text-decoration: none;
      transition: all .2s;
      font-weight: 500;
    }
    .btn-primary { background: var(--primary-dim); color: #fff; }
    .btn-primary:hover { background: var(--primary); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(124,58,237,.35); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #dc2626; transform: translateY(-1px); }
    .btn-outline { background: transparent; border: 1px solid #3a3a5a; color: var(--text2); }
    .btn-outline:hover { background: rgba(255,255,255,.04); color: #fff; border-color: var(--primary); }
    .btn-sm { padding: .3rem .7rem; font-size: .8rem; }
    .btn-ghost { background: none; border: none; color: var(--text2); padding: .3rem; cursor: pointer; font-size: 1.3rem; transition: color .15s; }
    .btn-ghost:hover { color: var(--gold); }

    /* ── FORMS ── */
    form label { display: block; margin-top: 1rem; font-size: .85rem; color: var(--text2); font-weight: 500; }
    form input, form select, form textarea {
      width: 100%;
      padding: .65rem .75rem;
      margin-top: .3rem;
      background: var(--bg);
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      color: var(--text);
      font-size: .95rem;
      font-family: inherit;
      transition: border-color .2s;
    }
    form input:focus, form select:focus, form textarea:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(168,85,247,.15); }
    form .btn { margin-top: 1.2rem; }
    .form-error { color: #f87171; font-size: .8rem; margin-top: .25rem; }

    /* ── SEARCH ── */
    .search-form { display: flex; gap: .5rem; margin-bottom: 1.5rem; }
    .search-form input { flex: 1; margin-top: 0; }

    /* ── PAGINATION ── */
    .pagination { display: flex; justify-content: center; align-items: center; gap: .25rem; margin-top: 1.5rem; }
    .pagination a {
      color: var(--text2);
      text-decoration: none;
      padding: .35rem .7rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: .85rem;
      transition: all .2s;
    }
    .pagination a:hover { background: var(--surface2); color: #fff; border-color: var(--primary); }
    .pagination span { padding: .35rem .5rem; color: var(--text2); font-size: .85rem; }

    /* ── TOAST ── */
    .flash {
      background: rgba(5,150,105,.15);
      border: 1px solid rgba(5,150,105,.3);
      color: #6ee7b7;
      padding: .75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      animation: slideDown .35s ease;
      font-size: .9rem;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── ANIMATIONS ── */
    .fade-in { animation: fadeIn .4s ease both; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in-delay { animation: fadeIn .4s ease .1s both; }

    /* ── UTILITY ── */
    .empty { text-align: center; padding: 3rem 1rem; }
    .empty p { font-size: 1rem; color: var(--text2); margin-bottom: 1rem; }
    .inline-form { display: inline; }
    .flex { display: flex; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .gap-2 { gap: .5rem; }
    .gap-3 { gap: .75rem; }
    .mt-2 { margin-top: .5rem; }
    .mt-3 { margin-top: .75rem; }
    .mb-2 { margin-bottom: .5rem; }
    .mb-3 { margin-bottom: .75rem; }

    /* ── SPINNER ── */
    .spinner {
      width: 24px; height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin: 2rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }

    /* ── RESPONSIVE GRID ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; }
    @media (max-width: 600px) {
      .grid-2 { grid-template-columns: 1fr; }
      .container { padding: 1rem .75rem; }
      nav { padding: 0 1rem; }
      .card { padding: 1rem; }
      .flex-between { flex-direction: column; align-items: start; gap: .5rem; }
    }

    /* ── ARTIST HEADER ── */
    .artist-header {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--primary);
      padding: .5rem 0 .25rem;
      margin: 1.5rem 0 .75rem;
      border-bottom: 1px solid var(--border);
    }
    .artist-header:first-of-type { margin-top: 0; }

    /* Cover art */
    .cover { width: 80px; height: 80px; border-radius: 8px; flex-shrink: 0; object-fit: cover; }
    @media (max-width: 480px) { .cover { width: 60px; height: 60px; } }
  </style>
</head>
<body>
  <nav>
    <a href="{% url 'song_list' %}" class="brand">♫ Euphonic</a>
    <button class="hamburger" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menú">☰</button>
    <div class="nav-links">
      {% if user.is_authenticated %}
        <span class="username">{{ user.username }}</span>
        <a href="{% url 'dashboard' %}">Estadísticas</a>
        <a href="{% url 'song_search' %}">Buscar</a>
        <a href="{% url 'playlist_list' %}">Playlists</a>
        <a href="{% url 'import_csv' %}">Importar</a>
        <a href="{% url 'song_create' %}">+ Nueva</a>
        <button id="theme-toggle" title="Cambiar tema">🌙</button>
        <form method="post" action="{% url 'logout' %}" style="display:inline">
          {% csrf_token %}
          <button type="submit">Cerrar sesión</button>
        </form>
      {% else %}
        <a href="{% url 'login' %}">Iniciar sesión</a>
      {% endif %}
    </div>
  </nav>
  <div class="container">
    {% if messages %}
      {% for msg in messages %}
        <div class="flash">{{ msg }}</div>
      {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </div>
  <script>
    // Audio preview toggle (play/stop)
    let currentAudio = null;
    let currentBtn = null;
    function togglePreview(audioId, btn) {
      const audio = document.getElementById(audioId);
      if (!audio) return;
      if (currentAudio && currentAudio !== audio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
        if (currentBtn) currentBtn.textContent = '▶ Preview';
      }
      if (audio.paused) {
        audio.play();
        btn.textContent = '⏹ Stop';
        currentAudio = audio;
        currentBtn = btn;
        audio.onended = () => { btn.textContent = '▶ Preview'; currentAudio = null; currentBtn = null; };
      } else {
        audio.pause();
        audio.currentTime = 0;
        btn.textContent = '▶ Preview';
        currentAudio = null;
        currentBtn = null;
      }
    }
    // Theme toggle
    (function() {
      const btn = document.getElementById('theme-toggle');
      const isLight = localStorage.getItem('theme') === 'light';
      if (isLight) { document.body.classList.add('light'); btn.textContent = '☀️'; }
      if (btn) {
        btn.addEventListener('click', () => {
          document.body.classList.toggle('light');
          const nowLight = document.body.classList.contains('light');
          localStorage.setItem('theme', nowLight ? 'light' : 'dark');
          btn.textContent = nowLight ? '☀️' : '🌙';
        });
      }
    })();
    // Auto-dismiss flash messages
    document.querySelectorAll('.flash').forEach(el => {
      setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, 4000);
    });
    // Close nav on link click (mobile)
    document.querySelectorAll('.nav-links a, .nav-links button').forEach(el => {
      el.addEventListener('click', () => document.querySelector('.nav-links')?.classList.remove('open'));
    });
  </script>
</body>
</html>
