{% extends "base.html" %}
{% block content %}

<div class="card" style="max-width:560px">
  <h2 style="margin-bottom:1rem">
    {% if object %}Editar «{{ object.title }}»{% else %}Nueva canción{% endif %}
  </h2>
  <form method="post">
    {% csrf_token %}
    {% for field in form %}
      <label>{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}
        <div class="form-error">{{ field.errors.0 }}</div>
      {% endif %}
    {% endfor %}
    <div style="display:flex;gap:.5rem;margin-top:1.2rem">
      <button type="submit" class="btn btn-primary">Guardar</button>
      <a href="{% url 'song_list' %}" class="btn btn-outline">Cancelar</a>
    </div>
  </form>
</div>

{% endblock %}
