{% extends "base.html" %}
{% block content %}

<div class="card" style="max-width:400px;margin:4rem auto">
  <h2 style="margin-bottom:1.5rem;text-align:center">Iniciar sesión</h2>
  <form method="post">
    {% csrf_token %}
    <label>Usuario</label>
    <input type="text" name="username" required>
    <label style="margin-top:1rem">Contraseña</label>
    <input type="password" name="password" required>
    {% if form.errors %}
      <div class="form-error" style="margin-top:.75rem">Usuario o contraseña incorrectos.</div>
    {% endif %}
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:1.5rem">Entrar</button>
  </form>
</div>

{% endblock %}
